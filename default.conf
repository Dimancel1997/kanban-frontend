server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/kanbans/ {
        proxy_pass http://kanban-app:8080/api/kanbans/;
        proxy_set_header Host $host;
    }

    location /api/tasks/ {
        proxy_pass http://kanban-app:8080/api/tasks/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}